server:
  port: 8081

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health

portal:
  manager-url: ${MANAGER_URL:http://localhost:8080}
  internal-token: ${INTERNAL_TOKEN:changeme-internal-token}
  workspace-base: ${WORKSPACE_BASE:/workspace}

logging:
  level:
    com.openclaw: INFO
