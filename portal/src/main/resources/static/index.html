<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo span { color: #e05a2b; }
    .logo p {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .tabs {
      display: flex;
      background: #111;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      color: #666;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: #2a2a2a;
      color: #fff;
    }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #e05a2b; }
    input::placeholder { color: #444; }

    .btn {
      width: 100%;
      padding: 11px;
      background: #e05a2b;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #c94d22; }
    .btn:disabled { background: #444; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .msg.error { background: #2a1010; color: #f87171; border: 1px solid #3a1515; }
    .msg.success { background: #0f2a14; color: #4ade80; border: 1px solid #1a3a1e; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Open<span>Claw</span></h1>
    <p>AI Agent Platform</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">登录</button>
    <button class="tab" onclick="switchTab('register')">注册</button>
  </div>

  <!-- Login -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>用户名</label>
      <input id="login-username" type="text" placeholder="请输入用户名" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn" onclick="doLogin()" id="btn-login">登录</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Register -->
  <div class="panel" id="panel-register">
    <div class="form-group">
      <label>用户名</label>
      <input id="reg-username" type="text" placeholder="请输入用户名" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="reg-password" type="password" placeholder="请设置密码" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') doRegister()" />
    </div>
    <button class="btn" onclick="doRegister()" id="btn-register">注册并进入</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.querySelectorAll('.panel').forEach((p, i) =>
      p.classList.toggle('active', (i === 0) === (tab === 'login')));
  }

  function showMsg(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (isError ? 'error' : 'success');
    el.style.display = 'block';
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showMsg('login-msg', '请填写用户名和密码', true); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = '登录中...';

    try {
      const res = await fetch('/portal/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('login-msg', '登录成功，正在进入...', false);
        setTimeout(() => { location.href = '/app/'; }, 600);
      } else {
        showMsg('login-msg', data.message || '用户名或密码错误', true);
        btn.disabled = false; btn.textContent = '登录';
      }
    } catch (e) {
      showMsg('login-msg', '网络错误，请稍后重试', true);
      btn.disabled = false; btn.textContent = '登录';
    }
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !password) { showMsg('reg-msg', '请填写用户名和密码', true); return; }
    if (password.length < 6) { showMsg('reg-msg', '密码至少 6 位', true); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = '注册中，正在初始化容器...';

    try {
      // Step 1: Register
      const regRes = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const regData = await regRes.json();
      if (!regData.success) {
        showMsg('reg-msg', regData.message || '注册失败', true);
        btn.disabled = false; btn.textContent = '注册并进入';
        return;
      }

      showMsg('reg-msg', '注册成功，正在登录...', false);

      // Step 2: Login
      const loginRes = await fetch('/portal/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const loginData = await loginRes.json();
      if (loginData.success) {
        showMsg('reg-msg', '初始化完成，正在进入...', false);
        setTimeout(() => { location.href = '/app/'; }, 800);
      } else {
        showMsg('reg-msg', '注册成功，请切换到登录页', false);
        btn.disabled = false; btn.textContent = '注册并进入';
      }
    } catch (e) {
      showMsg('reg-msg', '网络错误，请稍后重试', true);
      btn.disabled = false; btn.textContent = '注册并进入';
    }
  }
</script>
</body>
</html>
